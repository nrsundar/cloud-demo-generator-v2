<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 680" font-family="Amazon Ember, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#232f3e"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff9900"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1b660f"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="680" rx="12" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="550" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#232f3e">Cloud Demo Generator v3 — Architecture</text>

  <!-- ===== LEFT: Users ===== -->
  <!-- SA -->
  <rect x="20" y="120" width="140" height="55" rx="27" fill="#232f3e" filter="url(#shadow)"/>
  <text x="90" y="143" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Solutions Architect</text>
  <text x="90" y="160" text-anchor="middle" font-size="10" fill="#aaa">/ TAM / SE</text>

  <!-- Browser -->
  <rect x="20" y="210" width="140" height="45" rx="6" fill="#fff" stroke="#666" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="90" y="237" text-anchor="middle" font-size="11" font-weight="bold" fill="#232f3e">🌐 Web Browser</text>

  <!-- Arrow: User → Browser -->
  <line x1="90" y1="175" x2="90" y2="208" stroke="#232f3e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== AWS Cloud ===== -->
  <rect x="200" y="50" width="880" height="580" rx="10" fill="none" stroke="#232f3e" stroke-width="2" stroke-dasharray="8,4"/>
  <rect x="210" y="38" width="120" height="24" fill="#f8f9fa"/>
  <text x="220" y="55" font-size="13" font-weight="bold" fill="#232f3e">AWS Cloud</text>

  <!-- VPC -->
  <rect x="370" y="80" width="690" height="360" rx="8" fill="none" stroke="#1b660f" stroke-width="1.5" stroke-dasharray="6,3"/>
  <rect x="380" y="68" width="160" height="24" fill="#f8f9fa"/>
  <text x="390" y="85" font-size="12" font-weight="bold" fill="#1b660f">VPC (10.0.0.0/16)</text>

  <!-- Public Subnet -->
  <rect x="390" y="105" width="250" height="160" rx="6" fill="#e8f5e9" stroke="#4caf50" stroke-width="1"/>
  <text x="400" y="122" font-size="10" font-weight="bold" fill="#2e7d32">Public Subnets (2 AZs)</text>

  <!-- ALB -->
  <rect x="410" y="135" width="210" height="60" rx="6" fill="#fff" stroke="#8c6bb1" stroke-width="2" filter="url(#shadow)"/>
  <text x="515" y="160" text-anchor="middle" font-size="12" font-weight="bold" fill="#232f3e">Application Load Balancer</text>
  <text x="515" y="178" text-anchor="middle" font-size="10" fill="#666">Internet-facing · HTTP :80</text>

  <!-- NAT -->
  <rect x="410" y="210" width="120" height="40" rx="4" fill="#fff" stroke="#ff9800" stroke-width="1.5"/>
  <text x="470" y="228" text-anchor="middle" font-size="10" font-weight="bold" fill="#e65100">NAT Gateway</text>
  <text x="470" y="242" text-anchor="middle" font-size="9" fill="#666">Outbound</text>

  <!-- Private Subnet -->
  <rect x="660" y="105" width="380" height="320" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
  <text x="670" y="122" font-size="10" font-weight="bold" fill="#1565c0">Private Subnets (2 AZs)</text>

  <!-- ECS Fargate -->
  <rect x="690" y="140" width="330" height="100" rx="6" fill="#fff" stroke="#ff9900" stroke-width="2" filter="url(#shadow)"/>
  <text x="855" y="165" text-anchor="middle" font-size="13" font-weight="bold" fill="#232f3e">Amazon ECS Fargate</text>
  <text x="855" y="183" text-anchor="middle" font-size="10" fill="#666">Node.js 18 · Express API</text>
  <text x="855" y="198" text-anchor="middle" font-size="10" fill="#666">React + Cloudscape UI</text>
  <text x="855" y="213" text-anchor="middle" font-size="10" fill="#666">ZIP Generator · Drizzle ORM</text>
  <text x="855" y="228" text-anchor="middle" font-size="9" fill="#999">256 CPU / 512 MB</text>

  <!-- RDS -->
  <rect x="690" y="270" width="200" height="70" rx="6" fill="#fff" stroke="#3b48cc" stroke-width="2" filter="url(#shadow)"/>
  <text x="790" y="295" text-anchor="middle" font-size="12" font-weight="bold" fill="#232f3e">RDS PostgreSQL 16</text>
  <text x="790" y="312" text-anchor="middle" font-size="10" fill="#666">Private · Encrypted</text>
  <text x="790" y="327" text-anchor="middle" font-size="9" fill="#999">Repos · Users · Analytics</text>

  <!-- ECR -->
  <rect x="920" y="270" width="100" height="55" rx="4" fill="#fff" stroke="#ff9900" stroke-width="1.5"/>
  <text x="970" y="293" text-anchor="middle" font-size="10" font-weight="bold" fill="#232f3e">ECR</text>
  <text x="970" y="308" text-anchor="middle" font-size="9" fill="#666">Container</text>
  <text x="970" y="320" text-anchor="middle" font-size="9" fill="#666">Registry</text>

  <!-- CloudWatch -->
  <rect x="920" y="345" width="100" height="45" rx="4" fill="#fff" stroke="#ff4f8b" stroke-width="1.5"/>
  <text x="970" y="365" text-anchor="middle" font-size="10" font-weight="bold" fill="#232f3e">CloudWatch</text>
  <text x="970" y="380" text-anchor="middle" font-size="9" fill="#666">Logs</text>

  <!-- ===== Outside VPC but in AWS ===== -->

  <!-- Cognito -->
  <rect x="220" y="100" width="130" height="65" rx="6" fill="#fff" stroke="#dd344c" stroke-width="2" filter="url(#shadow)"/>
  <text x="285" y="125" text-anchor="middle" font-size="11" font-weight="bold" fill="#232f3e">Cognito</text>
  <text x="285" y="142" text-anchor="middle" font-size="10" fill="#666">User Pool</text>
  <text x="285" y="156" text-anchor="middle" font-size="9" fill="#999">Email/Password · SRP</text>

  <!-- CloudFormation -->
  <rect x="220" y="200" width="130" height="40" rx="4" fill="#232f3e"/>
  <text x="285" y="224" text-anchor="middle" font-size="11" font-weight="bold" fill="white">CloudFormation</text>

  <!-- ===== BOTTOM: Output ===== -->
  <!-- Generated Output -->
  <rect x="220" y="480" width="840" height="140" rx="8" fill="#fff8e1" stroke="#ff9900" stroke-width="1.5"/>
  <text x="640" y="505" text-anchor="middle" font-size="13" font-weight="bold" fill="#232f3e">📦 Generated Demo Repository (ZIP Download)</text>

  <rect x="240" y="520" width="150" height="45" rx="4" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <text x="315" y="540" text-anchor="middle" font-size="10" font-weight="bold" fill="#232f3e">CloudFormation</text>
  <text x="315" y="555" text-anchor="middle" font-size="9" fill="#666">Infrastructure</text>

  <rect x="410" y="520" width="150" height="45" rx="4" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <text x="485" y="540" text-anchor="middle" font-size="10" font-weight="bold" fill="#232f3e">Application Code</text>
  <text x="485" y="555" text-anchor="middle" font-size="9" fill="#666">Python / JS / TS / Go</text>

  <rect x="580" y="520" width="150" height="45" rx="4" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <text x="655" y="540" text-anchor="middle" font-size="10" font-weight="bold" fill="#232f3e">DB Schema + Data</text>
  <text x="655" y="555" text-anchor="middle" font-size="9" fill="#666">Extensions · Seeds</text>

  <rect x="750" y="520" width="150" height="45" rx="4" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <text x="825" y="540" text-anchor="middle" font-size="10" font-weight="bold" fill="#232f3e">Documentation</text>
  <text x="825" y="555" text-anchor="middle" font-size="9" fill="#666">README · Setup Guide</text>

  <rect x="920" y="520" width="120" height="45" rx="4" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <text x="980" y="540" text-anchor="middle" font-size="10" font-weight="bold" fill="#232f3e">Learning</text>
  <text x="980" y="555" text-anchor="middle" font-size="9" fill="#666">Modules · Exercises</text>

  <!-- Example repos -->
  <text x="240" y="590" font-size="10" fill="#666">Example outputs:</text>
  <text x="240" y="607" font-size="10" fill="#1976d2">pgvector-hybrid-search-demo · postgis-property-search-demo · pgroute-transportation-demo</text>

  <!-- ===== ARROWS ===== -->

  <!-- Browser → ALB -->
  <line x1="160" y1="232" x2="408" y2="165" stroke="#232f3e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="270" y="188" font-size="9" fill="#666">HTTPS</text>

  <!-- Browser → Cognito -->
  <line x1="160" y1="225" x2="218" y2="145" stroke="#dd344c" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="170" y="178" font-size="9" fill="#dd344c">Auth</text>

  <!-- ALB → ECS -->
  <line x1="620" y1="165" x2="688" y2="175" stroke="#8c6bb1" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="650" y="160" font-size="9" fill="#666">:5000</text>

  <!-- ECS → RDS -->
  <line x1="790" y1="240" x2="790" y2="268" stroke="#3b48cc" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="805" y="258" font-size="9" fill="#666">:5432</text>

  <!-- ECS → Output (ZIP) -->
  <line x1="855" y1="240" x2="855" y2="478" stroke="#ff9900" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow-orange)"/>
  <text x="870" y="460" font-size="10" font-weight="bold" fill="#ff9900">Generate</text>

  <!-- Output → User -->
  <line x1="220" y1="540" x2="90" y2="257" stroke="#1b660f" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow-green)"/>
  <text x="120" y="420" font-size="10" font-weight="bold" fill="#1b660f">Download ZIP</text>

  <!-- Security labels -->
  <rect x="390" y="400" width="250" height="25" rx="4" fill="#e8f5e9" stroke="#4caf50" stroke-width="1"/>
  <text x="515" y="417" text-anchor="middle" font-size="9" fill="#2e7d32">🔒 Security Groups: ALB → ECS → RDS (least privilege)</text>
</svg>
