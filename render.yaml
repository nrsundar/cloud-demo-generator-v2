services:
  - type: web
    name: pg-demo-generator
    env: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: pg-demo-generator-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false
      - key: PGHOST
        fromDatabase:
          name: pg-demo-generator-db
          property: host
      - key: PGPORT
        fromDatabase:
          name: pg-demo-generator-db
          property: port
      - key: PGUSER
        fromDatabase:
          name: pg-demo-generator-db
          property: user
      - key: PGPASSWORD
        fromDatabase:
          name: pg-demo-generator-db
          property: password
      - key: PGDATABASE
        fromDatabase:
          name: pg-demo-generator-db
          property: database

databases:
  - name: pg-demo-generator-db
    databaseName: pg_demo_generator
    user: pg_demo_user
    plan: starter